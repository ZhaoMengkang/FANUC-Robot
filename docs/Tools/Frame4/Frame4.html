<html lang="zh-CN"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>四点法计算坐标系</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        table {
            margin-top: 20px;
            border-collapse:separate;
            width: 70%;
        }
        table, th, td {
            border: 1px solid #180707;
        }
        th, td {
            padding: 8px 12px; /* 调整内边距以增加表格的紧凑性 */
            text-align: left; /* 使表头和单元格内容居中 */
        }
        #dataDialog {
            display: none;
            position: fixed;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            padding: 20px;
            background-color: #cedab6;
            border: 1px solid #ddd;
            width: 500px;
            z-index: 1000;
        }
        #dialogOverlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 500;
        }
        .dialog-buttons {
            display: flex;
            justify-content: flex-end;
            margin-top: 10px;
        }
        .dialog-buttons button {
            margin-left: 10px;
        }
        .hint {
            font-size: 0.9em;
            color: #555;
            margin-left: 10px;
            display: block;
            width: 150px;
            float: right;
        }
    </style>
</head>
<body>

<h2>四点法计算坐标系</h2>

<p>请在下表中输入四个参考点的数据，或点击“数据解析”按钮自动填充：</p>

<table id="inputTable">
    <thead>
        <tr>
            <th>参考点</th>
            <th>X (mm)</th>
            <th>Y (mm)</th>
            <th>Z (mm)</th>
            <th>数据解析</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td>X轴原点</td>
            <td><input type="number" step="0.001" id="x0" placeholder="X"></td>
            <td><input type="number" step="0.001" id="y0" placeholder="Y"></td>
            <td><input type="number" step="0.001" id="z0" placeholder="Z"></td>
            <td><button type="button" onclick="openDataDialog(0)">数据解析</button></td>
        </tr>
        <tr>
            <td>X方向点</td>
            <td><input type="number" step="0.001" id="x1" placeholder="X"></td>
            <td><input type="number" step="0.001" id="y1" placeholder="Y"></td>
            <td><input type="number" step="0.001" id="z1" placeholder="Z"></td>
            <td><button type="button" onclick="openDataDialog(1)">数据解析</button></td>
        </tr>
        <tr>
            <td>Y方向点</td>
            <td><input type="number" step="0.001" id="x2" placeholder="X"></td>
            <td><input type="number" step="0.001" id="y2" placeholder="Y"></td>
            <td><input type="number" step="0.001" id="z2" placeholder="Z"></td>
            <td><button type="button" onclick="openDataDialog(2)">数据解析</button></td>
        </tr>
        <tr>
            <td>坐标原点</td>
            <td><input type="number" step="0.001" id="x3" placeholder="X"></td>
            <td><input type="number" step="0.001" id="y3" placeholder="Y"></td>
            <td><input type="number" step="0.001" id="z3" placeholder="Z"></td>
            <td><button type="button" onclick="openDataDialog(3)">数据解析</button></td>
        </tr>
    </tbody>
</table>

<button type="button" style="margin-top: 20px;" onclick="calculateEulerAngles()">计算欧拉角</button>

<div id="dialogOverlay" style="display: none;"></div>

<div id="dataDialog" style="display: none;">
    <label for="dataInput">请输入数据：</label>
    <textarea id="dataInput" rows="4" style="width:100%"></textarea>
    <div class="dialog-buttons">
        <button onclick="confirmData()">确认</button>
        <button onclick="closeDataDialog()">取消</button>
    </div>
    <span class="hint" style="width:50%">
        有效的数据格式:<br>
        { X = * mm, Y = * mm, Z = * mm, ... }<br>
        { X *, Y *, Z -*, ... }
    </span>
    
</div>

<h3>计算结果</h3>
<table id="resultTable">
    <thead>
        <tr>
            <th>X</th>
            <th>Y</th>
            <th>Z</th>
            <th>Rx (deg)</th>
            <th>Ry (deg)</th>
            <th>Rz (deg)</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td id="resultX"></td>
            <td id="resultY"></td>
            <td id="resultZ"></td>
            <td id="resultRoll"></td>
            <td id="resultPitch"></td>
            <td id="resultYaw"></td>
        </tr>
    </tbody>
</table>

<h3>旋转矩阵</h3>
<table id="rotationMatrixTable">
    <thead>
        <tr>
            <th>R11</th>
            <th>R12</th>
            <th>R13</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td id="r11"></td>
            <td id="r12"></td>
            <td id="r13"></td>
        </tr>
    </tbody>
</table>
<table id="rotationMatrixTable">
    <thead>
        <tr>
            <th>R21</th>
            <th>R22</th>
            <th>R23</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td id="r21"></td>
            <td id="r22"></td>
            <td id="r23"></td>
        </tr>
    </tbody>
</table>
<table id="rotationMatrixTable">
    <thead>
        <tr>
            <th>R31</th>
            <th>R32</th>
            <th>R33</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td id="r31"></td>
            <td id="r32"></td>
            <td id="r33"></td>
        </tr>
    </tbody>
</table>

<script>
let currentRow = -1;

function openDataDialog(rowIndex) {
    currentRow = rowIndex;
    document.getElementById('dataInput').value = '';
    document.getElementById('dataDialog').style.display = 'block';
    document.getElementById('dialogOverlay').style.display = 'block';
}

function closeDataDialog() {
    document.getElementById('dataDialog').style.display = 'none';
    document.getElementById('dialogOverlay').style.display = 'none';
    currentRow = -1;
}

function confirmData() {
    const inputData = document.getElementById('dataInput').value;
    let xMatch = inputData.match(/X\s*=?\s*([\d\.-]+)/);
    let yMatch = inputData.match(/Y\s*=?\s*([\d\.-]+)/);
    let zMatch = inputData.match(/Z\s*=?\s*([\d\.-]+)/);

    if (xMatch && yMatch && zMatch) {
        document.getElementById(`x${currentRow}`).value = parseFloat(xMatch[1]);
        document.getElementById(`y${currentRow}`).value = parseFloat(yMatch[1]);
        document.getElementById(`z${currentRow}`).value = parseFloat(zMatch[1]);
        closeDataDialog();
    } else {
        alert("数据格式无效，请重新输入！");
    }
}

function calculateEulerAngles() {
    // 获取用户输入的坐标数据
    let refPos = [];
    for (let i = 0; i < 4; i++) {
        refPos.push({
            x: parseFloat(document.getElementById(`x${i}`).value),
            y: parseFloat(document.getElementById(`y${i}`).value),
                       z: parseFloat(document.getElementById(`z${i}`).value),
        });
    }

    // 计算X轴、Y轴、Z轴方向和旋转矩阵
    let xAxisVector = normalize(subtract(refPos[1], refPos[0]));
    let xyPlaneVector = normalize(subtract(refPos[2], refPos[0]));
    let zAxisVector = normalize(crossProduct(xAxisVector, xyPlaneVector));
    let yAxisVector = normalize(crossProduct(zAxisVector, xAxisVector));

    // 将向量转换为旋转矩阵
    let transformationMatrix = vectorsToMatrix(xAxisVector, yAxisVector, zAxisVector);
    
    // 计算欧拉角
    let resultRPY = matrixToEuler(transformationMatrix);

    // 显示结果
    document.getElementById("resultX").innerText = refPos[3].x.toFixed(6);
    document.getElementById("resultY").innerText = refPos[3].y.toFixed(6);
    document.getElementById("resultZ").innerText = refPos[3].z.toFixed(6);
    document.getElementById("resultRoll").innerText = resultRPY.roll.toFixed(6);
    document.getElementById("resultPitch").innerText = resultRPY.pitch.toFixed(6);
    document.getElementById("resultYaw").innerText = resultRPY.yaw.toFixed(6);

    // 显示旋转矩阵
    document.getElementById("r11").innerText = transformationMatrix[0][0].toFixed(6);
    document.getElementById("r12").innerText = transformationMatrix[0][1].toFixed(6);
    document.getElementById("r13").innerText = transformationMatrix[0][2].toFixed(6);
    document.getElementById("r21").innerText = transformationMatrix[1][0].toFixed(6);
    document.getElementById("r22").innerText = transformationMatrix[1][1].toFixed(6);
    document.getElementById("r23").innerText = transformationMatrix[1][2].toFixed(6);
    document.getElementById("r31").innerText = transformationMatrix[2][0].toFixed(6);
    document.getElementById("r32").innerText = transformationMatrix[2][1].toFixed(6);
    document.getElementById("r33").innerText = transformationMatrix[2][2].toFixed(6);

    // 显示结果表格
    document.getElementById("resultTable").style.display = "table";
}

// 向量操作函数
function subtract(v1, v2) {
    return { x: v1.x - v2.x, y: v1.y - v2.y, z: v1.z - v2.z };
}

function normalize(v) {
    let length = Math.sqrt(v.x ** 2 + v.y ** 2 + v.z ** 2);
    return { x: v.x / length, y: v.y / length, z: v.z / length };
}

function crossProduct(v1, v2) {
    return {
        x: v1.y * v2.z - v1.z * v2.y,
        y: v1.z * v2.x - v1.x * v2.z,
        z: v1.x * v2.y - v1.y * v2.x
    };
}

function vectorsToMatrix(v1, v2, v3) {
    return [
        [v1.x, v2.x, v3.x],
        [v1.y, v2.y, v3.y],
        [v1.z, v2.z, v3.z]
    ];
}

function matrixToEuler(matrix) {
    let roll = Math.atan2(matrix[2][1], matrix[2][2]);
    let pitch = Math.atan2(-matrix[2][0], Math.sqrt(matrix[2][1] ** 2 + matrix[2][2] ** 2));
    let yaw = Math.atan2(matrix[1][0], matrix[0][0]);

    return { roll: roll * (180 / Math.PI), pitch: pitch * (180 / Math.PI), yaw: yaw * (180 / Math.PI) };
}
</script>




</body></html>
